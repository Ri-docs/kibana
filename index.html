<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RapidIdentity Kibana Query Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tooltip-panel {
      width: min(18rem, calc(100vw - 2rem));
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 antialiased">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <div>
        <h1 class="text-xl font-semibold tracking-tight text-slate-950">
          RapidIdentity Kibana Query Builder
        </h1>
      </div>
      <div class="hidden text-xs font-medium uppercase tracking-wide text-slate-400 sm:block">
        Browser localStorage
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6">
    <section class="rounded-lg border border-slate-200 bg-white shadow-sm">
      <div class="border-b border-slate-200 px-4 py-4 sm:px-6">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <h2 class="text-lg font-semibold text-slate-950">
              Query Criteria
            </h2>
          </div>

          <div class="grid grid-cols-1 gap-3 text-sm sm:grid-cols-2 lg:w-[34rem]">
            <div class="space-y-1">
              <label class="flex items-center gap-2 font-medium text-slate-700" for="queryNameInput">
                Saved query name
                <span class="relative inline-flex group">
                  <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Saved query name help">?</button>
                  <span class="tooltip-panel pointer-events-none absolute right-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                    Used only for the saved-query menu. It does not change the generated Kibana query.
                  </span>
                </span>
              </label>
              <input id="queryNameInput" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
            </div>

            <div class="space-y-1">
              <label class="flex items-center gap-2 font-medium text-slate-700" for="outputFormatSelect">
                Output format
                <span class="relative inline-flex group">
                  <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Output format help">?</button>
                  <span class="tooltip-panel pointer-events-none absolute right-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                    Discover JSON matches Kibana's edit-query popover. Query body wraps it for Elasticsearch APIs.
                  </span>
                </span>
              </label>
              <select id="outputFormatSelect" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100">
                <option value="discover">Discover JSON query</option>
                <option value="body">Elasticsearch query body</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="grid gap-0 lg:grid-cols-[minmax(0,1fr)_minmax(22rem,34rem)]">
        <div class="space-y-6 border-b border-slate-200 p-4 sm:p-6 lg:border-b-0 lg:border-r">
          <fieldset class="space-y-4">
            <legend class="text-sm font-semibold text-slate-950">
              Scope
            </legend>
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <div class="space-y-1">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="tenantIdInput">
                  Tenant ID
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Tenant ID help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      When filled, this adds <span class="font-mono">kubernetes.namespace = idaas-&lt;tenant ID&gt;</span>. Leave it blank for a global search.
                    </span>
                  </span>
                </label>
                <input id="tenantIdInput" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
              </div>

              <div class="space-y-1">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="ingressIpInput">
                  Ingress remote IP
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Ingress IP help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      Adds a term filter on <span class="font-mono">httpRequest.remoteIp</span>. Combine with a blank Tenant ID for all tenants.
                    </span>
                  </span>
                </label>
                <input id="ingressIpInput" type="text" inputmode="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
              </div>
            </div>
          </fieldset>

          <fieldset class="space-y-4">
            <legend class="text-sm font-semibold text-slate-950">
              Customer Filters
            </legend>
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
              <div class="space-y-2">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="includeCustomersInput">
                  Include customers
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Include customers help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      Adds one or more <span class="font-mono">fields.customer</span> filters. Multiple values are treated as OR.
                    </span>
                  </span>
                </label>
                <input id="includeCustomersInput" type="text" list="knownCustomers" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
                <div class="flex flex-wrap gap-2">
                  <button type="button" data-add-customer="includeCustomersInput" data-customer-value="cps" class="rounded-md border border-slate-300 px-2 py-1 text-xs font-medium text-slate-600 hover:border-sky-300 hover:bg-sky-50 hover:text-sky-700">CPS</button>
                  <button type="button" data-add-customer="includeCustomersInput" data-customer-value="ncdpi" class="rounded-md border border-slate-300 px-2 py-1 text-xs font-medium text-slate-600 hover:border-sky-300 hover:bg-sky-50 hover:text-sky-700">NCDPI</button>
                </div>
              </div>

              <div class="space-y-2">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="excludeCustomersInput">
                  Exclude customers
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Exclude customers help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      Adds <span class="font-mono">must_not</span> clauses for <span class="font-mono">fields.customer</span>, useful for global searches.
                    </span>
                  </span>
                </label>
                <input id="excludeCustomersInput" type="text" list="knownCustomers" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
                <div class="flex flex-wrap gap-2">
                  <button type="button" data-add-customer="excludeCustomersInput" data-customer-value="cps" class="rounded-md border border-slate-300 px-2 py-1 text-xs font-medium text-slate-600 hover:border-rose-300 hover:bg-rose-50 hover:text-rose-700">CPS</button>
                  <button type="button" data-add-customer="excludeCustomersInput" data-customer-value="ncdpi" class="rounded-md border border-slate-300 px-2 py-1 text-xs font-medium text-slate-600 hover:border-rose-300 hover:bg-rose-50 hover:text-rose-700">NCDPI</button>
                </div>
              </div>
            </div>
            <datalist id="knownCustomers">
              <option value="cps"></option>
              <option value="ncdpi"></option>
            </datalist>
          </fieldset>

          <fieldset class="space-y-4">
            <legend class="text-sm font-semibold text-slate-950">
              Common Fields
            </legend>
            <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
              <div class="space-y-1 md:col-span-3">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="messageTextInput">
                  Message phrase
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Message phrase help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      Adds a <span class="font-mono">match_phrase</span> clause on <span class="font-mono">message</span>.
                    </span>
                  </span>
                </label>
                <input id="messageTextInput" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
              </div>

              <div class="space-y-1">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="jobIdInput">
                  Job ID or name
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Job ID help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      Adds a phrase filter on <span class="font-mono">clusteredJob_id</span>.
                    </span>
                  </span>
                </label>
                <input id="jobIdInput" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
              </div>

              <div class="space-y-1">
                <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="podNameInput">
                  Pod name
                  <span class="relative inline-flex group">
                    <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Pod name help">?</button>
                    <span class="tooltip-panel pointer-events-none absolute left-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                      Adds a term filter on <span class="font-mono">kubernetes.pod.name</span>.
                    </span>
                  </span>
                </label>
                <input id="podNameInput" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
              </div>
            </div>
          </fieldset>

          <fieldset class="space-y-3">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <legend class="text-sm font-semibold text-slate-950">
                Custom Field Rules
              </legend>
              <div class="flex flex-wrap gap-2">
                <button id="addIncludeRuleButton" type="button" class="inline-flex items-center gap-2 rounded-md border border-sky-200 bg-sky-50 px-3 py-2 text-sm font-medium text-sky-700 hover:bg-sky-100">
                  <span aria-hidden="true">+</span>
                  Include rule
                </button>
                <button id="addExcludeRuleButton" type="button" class="inline-flex items-center gap-2 rounded-md border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-medium text-rose-700 hover:bg-rose-100">
                  <span aria-hidden="true">+</span>
                  Exclude rule
                </button>
              </div>
            </div>

            <div id="filterRulesList" class="space-y-3"></div>
          </fieldset>
        </div>

        <aside class="space-y-4 bg-slate-50 p-4 sm:p-6">
          <div class="flex flex-wrap gap-3">
            <button id="justBuildButton" class="inline-flex items-center justify-center rounded-md bg-sky-700 px-4 py-2 text-sm font-medium text-white hover:bg-sky-800">
              Build query
            </button>

            <button id="createQueryButton" class="inline-flex items-center justify-center rounded-md border border-sky-700 px-4 py-2 text-sm font-medium text-sky-700 hover:bg-sky-50">
              Save query
            </button>

            <button id="copyQueryButton" class="inline-flex items-center justify-center rounded-md border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-white">
              Copy
            </button>

            <div class="relative ml-auto">
              <button id="savedQueriesToggle" class="inline-flex items-center gap-2 rounded-md border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
                <span>Saved</span>
                <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <path d="M5 7l5 6 5-6H5z" fill="currentColor" />
                </svg>
              </button>
              <div id="savedQueriesMenu" class="absolute right-0 z-20 mt-2 hidden w-72 rounded-md border border-slate-200 bg-white shadow-lg sm:w-80">
                <div id="savedQueriesList" class="max-h-72 overflow-y-auto py-1 text-sm"></div>
              </div>
            </div>
          </div>

          <div id="statusMessage" class="min-h-6 text-sm text-slate-600"></div>

          <div class="space-y-2">
            <label class="flex items-center gap-2 text-sm font-medium text-slate-700" for="queryOutput">
              Generated query
              <span class="relative inline-flex group">
                <button type="button" class="flex h-5 w-5 items-center justify-center rounded-full border border-slate-300 text-xs text-slate-500" aria-label="Generated query help">?</button>
                <span class="tooltip-panel pointer-events-none absolute right-0 top-7 z-30 hidden rounded-md border border-slate-200 bg-white p-3 text-xs font-normal leading-5 text-slate-600 shadow-lg group-hover:block group-focus-within:block">
                  Paste the Discover JSON query into Kibana's edit-query popover, or switch the format for API query bodies.
                </span>
              </span>
            </label>
            <textarea id="queryOutput" class="h-[34rem] w-full resize-y rounded-md border border-slate-300 bg-white px-3 py-3 font-mono text-xs leading-5 text-slate-900 focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" spellcheck="false"></textarea>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <div id="confirmDialog" class="fixed inset-0 z-30 hidden items-center justify-center bg-slate-950/40 px-4">
    <div class="w-full max-w-sm rounded-lg bg-white p-4 shadow-xl">
      <h3 class="text-sm font-semibold text-slate-950" id="confirmTitle">
        Delete query
      </h3>
      <p class="mt-2 text-sm text-slate-600" id="confirmMessage">
        Delete this saved query?
      </p>
      <div class="mt-4 flex justify-end gap-2">
        <button id="confirmCancel" class="rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
          Cancel
        </button>
        <button id="confirmOk" class="rounded-md bg-rose-600 px-3 py-2 text-sm font-medium text-white hover:bg-rose-700">
          Delete
        </button>
      </div>
    </div>
  </div>

  <template id="filterRuleTemplate">
    <div data-filter-rule class="rounded-md border border-slate-200 bg-white p-3 shadow-sm">
      <div class="grid grid-cols-1 gap-3 sm:grid-cols-[8rem_minmax(10rem,1fr)_minmax(10rem,1fr)_auto] sm:items-end">
        <div class="space-y-1">
          <label class="text-xs font-medium uppercase tracking-wide text-slate-500">
            Rule
          </label>
          <select data-rule-mode class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100">
            <option value="include">Include</option>
            <option value="exclude">Exclude</option>
          </select>
        </div>
        <div class="space-y-1">
          <label class="text-xs font-medium uppercase tracking-wide text-slate-500">
            Field
          </label>
          <select data-rule-field class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100">
            <option value="fields.customer">fields.customer</option>
            <option value="message">message</option>
            <option value="clusteredJob_id">clusteredJob_id</option>
            <option value="kubernetes.namespace">kubernetes.namespace</option>
            <option value="kubernetes.pod.name">kubernetes.pod.name</option>
            <option value="httpRequest.remoteIp">httpRequest.remoteIp</option>
            <option value="custom">Custom field</option>
          </select>
          <input data-rule-custom-field type="text" class="hidden w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
        </div>
        <div class="space-y-1">
          <label class="text-xs font-medium uppercase tracking-wide text-slate-500">
            Value
          </label>
          <input data-rule-value type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-100" />
        </div>
        <button data-remove-rule type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-slate-300 text-slate-500 hover:border-rose-300 hover:bg-rose-50 hover:text-rose-700" aria-label="Remove custom field rule">
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M7 3h6v2h4v2h-1v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7H3V5h4V3zm2 2V4h2v1H9zm-1 4v7h2V9H8zm4 0v7h2V9h-2z" fill="currentColor" />
          </svg>
        </button>
      </div>
    </div>
  </template>

  <script>
    const STORAGE_KEY = "riKibanaQueries";
    const TERM_FIELDS = new Set([
      "httpRequest.remoteIp",
      "kubernetes.namespace",
      "kubernetes.pod.name"
    ]);

    let savedQueries = [];
    let pendingDeleteId = null;

    function $(id) {
      return document.getElementById(id);
    }

    function safeLoadSavedQueries() {
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed;
      } catch (e) {
        return [];
      }
    }

    function persistSavedQueries() {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(savedQueries));
      } catch (e) {
      }
    }

    function trimValue(value) {
      return (value || "").trim();
    }

    function splitList(value) {
      return trimValue(value)
        .split(/[,\n;]/)
        .map(function (part) {
          return part.trim();
        })
        .filter(Boolean);
    }

    function addValueToListInput(inputId, value) {
      const input = $(inputId);
      const existing = splitList(input.value);
      if (!existing.some(function (item) {
        return item.toLowerCase() === value.toLowerCase();
      })) {
        existing.push(value);
      }
      input.value = existing.join(", ");
      input.focus();
    }

    function getNamespaceValue(tenantId) {
      const trimmed = trimValue(tenantId);
      if (!trimmed) return "";
      if (trimmed.toLowerCase().startsWith("idaas-")) return trimmed;
      return "idaas-" + trimmed;
    }

    function exactClause(field, value) {
      if (TERM_FIELDS.has(field)) {
        return { term: { [field]: value } };
      }
      return { match_phrase: { [field]: value } };
    }

    function anyOfClauses(field, values) {
      const clauses = values.map(function (value) {
        return exactClause(field, value);
      });
      if (clauses.length === 1) return clauses[0];
      return {
        bool: {
          should: clauses,
          minimum_should_match: 1
        }
      };
    }

    function readCustomRules(errors) {
      const rules = [];
      document.querySelectorAll("[data-filter-rule]").forEach(function (row, index) {
        const mode = row.querySelector("[data-rule-mode]").value;
        const fieldSelect = row.querySelector("[data-rule-field]").value;
        const customField = trimValue(row.querySelector("[data-rule-custom-field]").value);
        const value = trimValue(row.querySelector("[data-rule-value]").value);
        const field = fieldSelect === "custom" ? customField : fieldSelect;

        if (!value && !field) return;
        if (!field) {
          errors.push("Custom rule " + (index + 1) + " needs a field.");
          return;
        }
        if (!value) {
          errors.push("Custom rule " + (index + 1) + " needs a value.");
          return;
        }

        rules.push({
          mode: mode,
          field: field,
          value: value
        });
      });
      return rules;
    }

    function buildQueryClause() {
      const errors = [];
      const filter = [];
      const must = [];
      const mustNot = [];

      const tenantId = trimValue($("tenantIdInput").value);
      const namespace = getNamespaceValue(tenantId);
      const includeCustomers = splitList($("includeCustomersInput").value);
      const excludeCustomers = splitList($("excludeCustomersInput").value);
      const messageText = trimValue($("messageTextInput").value);
      const jobId = trimValue($("jobIdInput").value);
      const podName = trimValue($("podNameInput").value);
      const ingressIp = trimValue($("ingressIpInput").value);

      if (namespace) {
        filter.push(exactClause("kubernetes.namespace", namespace));
      }

      if (includeCustomers.length) {
        filter.push(anyOfClauses("fields.customer", includeCustomers));
      }

      if (excludeCustomers.length) {
        mustNot.push(anyOfClauses("fields.customer", excludeCustomers));
      }

      if (messageText) {
        must.push(exactClause("message", messageText));
      }

      if (jobId) {
        filter.push(exactClause("clusteredJob_id", jobId));
      }

      if (podName) {
        filter.push(exactClause("kubernetes.pod.name", podName));
      }

      if (ingressIp) {
        filter.push(exactClause("httpRequest.remoteIp", ingressIp));
      }

      readCustomRules(errors).forEach(function (rule) {
        const clause = exactClause(rule.field, rule.value);
        if (rule.mode === "exclude") {
          mustNot.push(clause);
        } else {
          filter.push(clause);
        }
      });

      if (errors.length) {
        return { query: null, errors: errors };
      }

      if (!filter.length && !must.length && !mustNot.length) {
        return {
          query: { match_all: {} },
          errors: []
        };
      }

      const bool = {};
      if (filter.length) bool.filter = filter;
      if (must.length) bool.must = must;
      if (mustNot.length) bool.must_not = mustNot;

      return {
        query: { bool: bool },
        errors: []
      };
    }

    function buildQueryJson() {
      const result = buildQueryClause();
      if (result.errors.length) {
        return result;
      }

      const outputFormat = $("outputFormatSelect").value;
      const output = outputFormat === "body"
        ? { query: result.query }
        : result.query;

      return {
        query: output,
        errors: []
      };
    }

    function setStatus(message, isError) {
      const el = $("statusMessage");
      el.textContent = message || "";
      if (!message) {
        el.className = "min-h-6 text-sm text-slate-600";
      } else if (isError) {
        el.className = "min-h-6 text-sm font-medium text-rose-700";
      } else {
        el.className = "min-h-6 text-sm font-medium text-emerald-700";
      }
    }

    function renderSavedQueries() {
      const list = $("savedQueriesList");
      list.innerHTML = "";
      if (!savedQueries.length) {
        const empty = document.createElement("div");
        empty.className = "px-4 py-3 text-sm text-slate-500";
        empty.textContent = "No saved queries yet.";
        list.appendChild(empty);
        return;
      }

      savedQueries
        .slice()
        .sort(function (a, b) {
          return a.name.localeCompare(b.name);
        })
        .forEach(function (q) {
          const row = document.createElement("div");
          row.className = "flex items-center justify-between gap-2 px-3 py-2 hover:bg-slate-50";

          const left = document.createElement("button");
          left.className = "min-w-0 flex-1 truncate rounded px-1 py-1 text-left text-sm text-slate-800";
          left.textContent = q.name;
          left.addEventListener("click", function () {
            $("queryNameInput").value = q.name;
            $("queryOutput").value = q.query;
            $("savedQueriesMenu").classList.add("hidden");
            setStatus("Loaded saved query: " + q.name + ".", false);
          });

          const delBtn = document.createElement("button");
          delBtn.className = "flex h-8 w-8 items-center justify-center rounded-md text-slate-500 hover:bg-rose-50 hover:text-rose-700";
          delBtn.setAttribute("type", "button");
          delBtn.setAttribute("aria-label", "Delete saved query");
          delBtn.innerHTML =
            '<svg class="h-4 w-4" viewBox="0 0 20 20" fill="none" aria-hidden="true">' +
            '<path d="M7 3h6v2h4v2h-1v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7H3V5h4V3zm2 2V4h2v1H9zm-1 4v7h2V9H8zm4 0v7h2V9h-2z" fill="currentColor" />' +
            "</svg>";
          delBtn.addEventListener("click", function (event) {
            event.stopPropagation();
            openConfirmDelete(q);
          });

          row.appendChild(left);
          row.appendChild(delBtn);
          list.appendChild(row);
        });
    }

    function openConfirmDelete(query) {
      pendingDeleteId = query.id;
      $("confirmMessage").textContent = 'Delete saved query "' + query.name + '"?';
      $("confirmDialog").classList.remove("hidden");
      $("confirmDialog").classList.add("flex");
    }

    function closeConfirmDialog() {
      $("confirmDialog").classList.add("hidden");
      $("confirmDialog").classList.remove("flex");
      pendingDeleteId = null;
    }

    function deletePendingQuery() {
      if (!pendingDeleteId) {
        closeConfirmDialog();
        return;
      }
      savedQueries = savedQueries.filter(function (q) {
        return q.id !== pendingDeleteId;
      });
      persistSavedQueries();
      renderSavedQueries();
      setStatus("Deleted saved query.", false);
      closeConfirmDialog();
    }

    function toggleSavedQueriesMenu() {
      const menu = $("savedQueriesMenu");
      const isHidden = menu.classList.contains("hidden");
      if (isHidden) {
        renderSavedQueries();
        menu.classList.remove("hidden");
      } else {
        menu.classList.add("hidden");
      }
    }

    function createFilterRule(mode) {
      const template = $("filterRuleTemplate");
      const fragment = template.content.cloneNode(true);
      const row = fragment.querySelector("[data-filter-rule]");
      const modeSelect = row.querySelector("[data-rule-mode]");
      const fieldSelect = row.querySelector("[data-rule-field]");
      const customField = row.querySelector("[data-rule-custom-field]");

      modeSelect.value = mode || "include";

      fieldSelect.addEventListener("change", function () {
        if (fieldSelect.value === "custom") {
          customField.classList.remove("hidden");
          customField.focus();
        } else {
          customField.classList.add("hidden");
          customField.value = "";
        }
      });

      row.querySelector("[data-remove-rule]").addEventListener("click", function () {
        row.remove();
      });

      $("filterRulesList").appendChild(fragment);
      row.querySelector("[data-rule-value]").focus();
    }

    function buildIntoOutput(successMessage) {
      const result = buildQueryJson();
      if (result.errors.length) {
        setStatus(result.errors.join(" "), true);
        return null;
      }

      const json = JSON.stringify(result.query, null, 2);
      $("queryOutput").value = json;
      setStatus(successMessage, false);
      return json;
    }

    function saveCurrentQuery() {
      const queryNameInput = $("queryNameInput");
      const name = queryNameInput.value.trim();
      if (!name) {
        setStatus("Add a saved query name before saving.", true);
        queryNameInput.focus();
        return;
      }

      const json = buildIntoOutput("Saved query: " + name + ".");
      if (!json) return;

      const id = Date.now().toString() + "-" + Math.random().toString(16).slice(2);
      savedQueries.push({
        id: id,
        name: name,
        query: json
      });
      persistSavedQueries();
      renderSavedQueries();
    }

    async function copyQueryOutput() {
      const output = $("queryOutput");
      const json = buildIntoOutput("Built query and copied it.");
      if (!json) return;

      try {
        await navigator.clipboard.writeText(output.value);
        setStatus("Copied generated query.", false);
      } catch (e) {
        output.focus();
        output.select();
        setStatus("Select and copy the generated query from the text area.", true);
      }
    }

    function setupEventHandlers() {
      $("createQueryButton").addEventListener("click", saveCurrentQuery);

      $("justBuildButton").addEventListener("click", function () {
        buildIntoOutput("Built query.");
      });

      $("copyQueryButton").addEventListener("click", copyQueryOutput);

      $("savedQueriesToggle").addEventListener("click", toggleSavedQueriesMenu);

      $("addIncludeRuleButton").addEventListener("click", function () {
        createFilterRule("include");
      });

      $("addExcludeRuleButton").addEventListener("click", function () {
        createFilterRule("exclude");
      });

      document.querySelectorAll("[data-add-customer]").forEach(function (button) {
        button.addEventListener("click", function () {
          addValueToListInput(button.dataset.addCustomer, button.dataset.customerValue);
        });
      });

      $("confirmCancel").addEventListener("click", closeConfirmDialog);
      $("confirmOk").addEventListener("click", deletePendingQuery);

      $("confirmDialog").addEventListener("click", function (event) {
        if (event.target === $("confirmDialog")) {
          closeConfirmDialog();
        }
      });

      document.addEventListener("click", function (event) {
        const menu = $("savedQueriesMenu");
        const toggle = $("savedQueriesToggle");
        if (!menu.contains(event.target) && !toggle.contains(event.target)) {
          menu.classList.add("hidden");
        }
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      savedQueries = safeLoadSavedQueries();
      renderSavedQueries();
      setupEventHandlers();
      buildIntoOutput("Ready.");
      setStatus("", false);
    });
  </script>
</body>
</html>
